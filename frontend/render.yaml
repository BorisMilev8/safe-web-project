services:
  - type: web
    name: safe-web-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium firefox
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: safe-web-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: safe-web-backend
          property: host
